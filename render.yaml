services:
  - type: web
    name: katiba-os-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 24.14.0
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: /tmp/katiba-os.db
      - key: ALLOWED_ORIGINS
        value: https://katibaos.njajisamson.workers.dev
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_TRANSCRIBE_MODEL
        value: gpt-4o-transcribe
      - key: OPENAI_TTS_MODEL
        value: tts-1
      - key: OPENAI_TTS_VOICE
        value: alloy
