services:
  - type: web
    name: katiba-os-api
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    maxShutdownDelaySeconds: 30
    envVars:
      - key: NODE_VERSION
        value: 24.14.0
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: /var/data/katiba-os.db
      - key: ALLOWED_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_TRANSCRIBE_MODEL
        value: gpt-4o-transcribe
      - key: OPENAI_TTS_MODEL
        value: tts-1
      - key: OPENAI_TTS_VOICE
        value: alloy
    disk:
      name: katiba-os-data
      mountPath: /var/data
      sizeGB: 1
